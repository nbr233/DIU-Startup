services:
  - type: web
    name: diu-startup-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: DB_ENGINE
        value: postgresql
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: diu-startup-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: diu-startup-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "diu-startup-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"

  - type: redis
    name: diu-startup-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: diu-startup-db
    plan: free
    databaseName: diu_startup
    user: diu_admin
